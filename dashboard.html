<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rPPG · Cardiac Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1632432234/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:        #04060d;
      --panel:     #080c18;
      --border:    #0f1e38;
      --green:     #00f5a0;
      --green-dim: #00a86b;
      --cyan:      #00d9ff;
      --amber:     #ffaa00;
      --magenta:   #ff4dc4;
      --blue:      #0af;
      --red:       #ff3b6b;
      --text:      #8da3c0;
      --glow:      0 0 18px #00f5a080, 0 0 40px #00f5a030;
      --glow-red:  0 0 18px #ff3b6b80, 0 0 40px #ff3b6b30;
      --glow-amber:0 0 18px #ffaa0080, 0 0 40px #ffaa0030;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #050810 0%, #08111f 100%);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 4px;
      color: var(--green);
      text-shadow: var(--glow);
    }
    .logo span { color: var(--text); text-shadow: none; }
    .header-meta {
      display: flex; gap: 32px; align-items: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: var(--glow);
      animation: pulse-dot 2s ease-in-out infinite;
      display: inline-block; margin-right: 6px;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #clock { color: var(--blue); }
    #fps-counter { color: var(--amber); }

    /* ── Main: 2x2 grid ── */
    main {
      display: grid;
      grid-template-columns: 3fr 2fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }
    .panel {
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }
    .panel-label {
      position: absolute;
      top: 12px; left: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--green-dim);
      z-index: 6;
      pointer-events: none;
    }

    /* ── ① VIDEO PANEL (top-left, primary) ── */
    #video-panel {
      grid-column: 1; grid-row: 1;
      background: #000;
    }
    #mp-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);     /* selfie mirror */
      z-index: 1;
    }
    #video-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 3;
    }
    #video-panel::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg,
        rgba(0,245,160,0.05) 0px,
        rgba(0,245,160,0.05) 1px,
        transparent 1px,
        transparent 3px);
      pointer-events: none;
      z-index: 4;
      mix-blend-mode: screen;
    }
    #video-overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    #video-status {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem; letter-spacing: 4px;
      color: var(--green-dim); text-align: center;
      z-index: 7;
      padding: 14px 22px;
      border: 1px solid var(--green-dim);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
    }
    #quality-badge {
      position: absolute;
      top: 12px; right: 16px;
      z-index: 7;
      display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem; letter-spacing: 2px;
      padding: 4px 10px;
      border: 1px solid var(--green-dim);
      background: rgba(0,0,0,0.55);
      color: var(--green);
    }
    #quality-badge.warn { border-color: var(--amber); color: var(--amber); }
    #quality-badge.bad  { border-color: var(--red);   color: var(--red); }
    #quality-bars { display: flex; gap: 2px; align-items: flex-end; height: 10px; }
    #quality-bars div { width: 3px; background: currentColor; opacity: 0.25; }
    #quality-bars div.lit { opacity: 1; }
    #quality-bars div:nth-child(1){height:3px}
    #quality-bars div:nth-child(2){height:5px}
    #quality-bars div:nth-child(3){height:7px}
    #quality-bars div:nth-child(4){height:9px}

    /* ── ② HR PANEL (top-right) ── */
    #hr-panel {
      grid-column: 2; grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
    }
    .hr-ring-wrap { position: relative; width: 220px; height: 220px; }
    .hr-ring {
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 2px solid var(--border);
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .hr-ring::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid var(--green);
      box-shadow: var(--glow);
      animation: ring-pulse 1s ease-in-out infinite;
      animation-play-state: paused;
    }
    .hr-ring.beating::before { animation-play-state: running; }
    .hr-ring.warn::before {
      border-color: var(--amber);
      box-shadow: var(--glow-amber);
      animation: none;
      opacity: 0.7;
    }
    .hr-ring.no-signal::before {
      border-color: var(--border);
      box-shadow: none;
      animation: none;
      opacity: 0.4;
    }
    @keyframes ring-pulse {
      0%   { transform: scale(1);    opacity: 0.8; }
      50%  { transform: scale(1.06); opacity: 0.3; }
      100% { transform: scale(1);    opacity: 0.8; }
    }
    .hr-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      color: var(--green);
      text-shadow: var(--glow);
      line-height: 1; letter-spacing: 2px;
      transition: color 0.4s, text-shadow 0.4s;
    }
    .hr-number.warn { color: var(--amber); text-shadow: var(--glow-amber); }
    .hr-number.dim  { color: var(--text);  text-shadow: none; opacity: 0.4; }
    .hr-unit {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; color: var(--green-dim);
      letter-spacing: 3px; text-align: center;
    }
    .hr-status {
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 1.5px; color: var(--text);
      text-align: center;
      min-height: 1.2em;
      max-width: 95%;
    }
    .hr-status.normal { color: var(--green); }
    .hr-status.low    { color: var(--blue); }
    .hr-status.high   { color: var(--red); text-shadow: var(--glow-red); }
    .hr-status.warn   { color: var(--amber); text-shadow: var(--glow-amber); }
    .hr-status.bad    { color: var(--red); opacity: 0.85; }

    .heart-icon {
      position: absolute; bottom: 12px; right: 12px;
      font-size: 1.3rem;
      animation: heartbeat 1s ease-in-out infinite;
      animation-play-state: paused;
      filter: drop-shadow(0 0 6px var(--red));
    }
    .heart-icon.beating { animation-play-state: running; }
    @keyframes heartbeat {
      0%{transform:scale(1)} 14%{transform:scale(1.25)}
      28%{transform:scale(1)} 42%{transform:scale(1.12)}
      70%{transform:scale(1)} 100%{transform:scale(1)}
    }

    /* ── ③ MESH PANEL (bottom-left, demoted) ── */
    #mesh-panel {
      grid-column: 1; grid-row: 2;
      background: radial-gradient(ellipse at 50% 50%, #061226 0%, #02030a 80%);
    }
    #mesh-panel::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg,
        rgba(0,245,160,0.025) 0px,
        rgba(0,245,160,0.025) 1px,
        transparent 1px,
        transparent 3px);
      pointer-events: none;
      z-index: 3;
      mix-blend-mode: screen;
    }
    #mesh-canvas {
      width: 100%; height: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }
    #mesh-status {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; letter-spacing: 3px;
      color: var(--green-dim); text-align: center;
      z-index: 5;
      padding: 10px 16px;
      border: 1px solid var(--green-dim);
      background: rgba(0,0,0,0.4);
    }
    #colorbar {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem; color: var(--text);
      z-index: 4;
      letter-spacing: 1.5px;
    }
    #colorbar-gradient {
      width: 100px; height: 5px; border-radius: 2px;
      background: linear-gradient(90deg,
        #001e5c 0%, #00aaff 25%, #00f5a0 50%, #ffd000 75%, #ff3b6b 100%);
    }

    /* ── ④ BVP PANEL (bottom-right) ── */
    #bvp-panel {
      grid-column: 2; grid-row: 2;
      padding-top: 36px;
    }
    #bvp-canvas { width: 100%; height: calc(100% - 36px); display: block; }
    .grid-overlay {
      position: absolute; inset: 36px 0 0 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 30px;
      pointer-events: none; opacity: 0.5;
    }

    /* ── Corner brackets ── */
    .corner {
      position: absolute; width: 14px; height: 14px;
      border-color: var(--green); border-style: solid; opacity: 0.5;
      z-index: 6;
    }
    .corner.tl { top: 8px;    left: 8px;  border-width: 1px 0 0 1px; }
    .corner.tr { top: 8px;    right: 8px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 8px; left: 8px;  border-width: 0 0 1px 1px; }
    .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>

<header>
  <div class="logo">rPPG <span>· CARDIAC MONITOR</span></div>
  <div class="header-meta">
    <span><span class="status-dot"></span><span id="status-text">CONNECTING</span></span>
    <span id="clock">00:00:00</span>
    <span id="fps-counter">-- FPS</span>
  </div>
</header>

<main>

  <!-- ① LIVE FEED with ROI overlay -->
  <div class="panel" id="video-panel">
    <div class="panel-label">LIVE FEED · ROI TRACKING</div>
    <div id="quality-badge">
      <span id="quality-label">SIGNAL</span>
      <div id="quality-bars"><div></div><div></div><div></div><div></div></div>
    </div>
    <video id="mp-video" autoplay playsinline muted></video>
    <canvas id="video-overlay"></canvas>
    <div id="video-status">INITIALIZING CAMERA...</div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <!-- ② HEART RATE -->
  <div class="panel" id="hr-panel">
    <div class="panel-label">HEART RATE</div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="hr-ring-wrap">
      <div class="hr-ring no-signal" id="hr-ring">
        <div>
          <div class="hr-number dim" id="hr-value">--</div>
          <div class="hr-unit">BPM</div>
        </div>
      </div>
      <div class="heart-icon" id="heart-icon">♥</div>
    </div>
    <div class="hr-status" id="hr-status">ACQUIRING SIGNAL</div>
  </div>

  <!-- ③ MESH (demoted) -->
  <div class="panel" id="mesh-panel">
    <div class="panel-label">FACE MESH · 468 LANDMARKS</div>
    <canvas id="mesh-canvas"></canvas>
    <div id="mesh-status">WAITING FOR FACE...</div>
    <div id="colorbar">
      <span>0%</span>
      <div id="colorbar-gradient"></div>
      <span>100%</span>
    </div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <!-- ④ BVP -->
  <div class="panel" id="bvp-panel">
    <div class="panel-label">BVP · BLOOD VOLUME PULSE</div>
    <div class="grid-overlay"></div>
    <canvas id="bvp-canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toTimeString().slice(0, 8);
}
setInterval(updateClock, 1000); updateClock();

// ═══════════════════════════════════════════
//  CONFIDENCE TIERS
//   q ≥ Q_GOOD : green, pulsing — trust the value
//   q ≥ Q_OK   : amber, no pulse — "LOW CONFIDENCE"
//   q <  Q_OK  : refuse to display a number
// ═══════════════════════════════════════════
const Q_GOOD = 0.60;
const Q_OK   = 0.30;

// ═══════════════════════════════════════════
//  SOCKET
// ═══════════════════════════════════════════
const socket   = io();
const statusEl = document.getElementById('status-text');
socket.on('connect',    () => { statusEl.textContent = 'LIVE'; });
socket.on('disconnect', () => { statusEl.textContent = 'OFFLINE'; });
socket.on('frame', () => {});

// ═══════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════
const hrValueEl  = document.getElementById('hr-value');
const hrStatusEl = document.getElementById('hr-status');
const hrRing     = document.getElementById('hr-ring');
const heartIcon  = document.getElementById('heart-icon');
const fpsEl      = document.getElementById('fps-counter');
const qBadge     = document.getElementById('quality-badge');
const qLabel     = document.getElementById('quality-label');
const qBars      = document.querySelectorAll('#quality-bars div');

function hrZone(hr) {
  if (hr < 50)  return { label: 'BRADYCARDIA',  cls: 'low'    };
  if (hr < 60)  return { label: 'LOW NORMAL',   cls: 'low'    };
  if (hr < 100) return { label: 'NORMAL SINUS', cls: 'normal' };
  if (hr < 120) return { label: 'ELEVATED',     cls: 'high'   };
  return               { label: 'TACHYCARDIA',  cls: 'high'   };
}

let currentHR        = null;
let currentQuality   = 0;
let lastValidHRTime  = 0;
let lastVitalsTime   = 0;

function updateQualityBadge(q) {
  currentQuality = q;
  const lit = Math.round(q * 4);
  qBars.forEach((b, i) => b.classList.toggle('lit', i < lit));
  qBadge.classList.remove('warn', 'bad');
  if (q < Q_OK)        { qBadge.classList.add('bad');  qLabel.textContent = 'NO SIGNAL'; }
  else if (q < Q_GOOD) { qBadge.classList.add('warn'); qLabel.textContent = 'LOW SIG';   }
  else                 {                                qLabel.textContent = 'STRONG';   }
}

function setHR(hr, quality) {
  if (typeof quality === 'number') updateQualityBadge(quality);

  if (typeof hr !== 'number' || !isFinite(hr) || hr < 30 || hr > 220) return false;
  const q = typeof quality === 'number' ? quality : 0;

  // Tier 3: not enough signal — refuse to show a number
  if (q < Q_OK) {
    clearHR('INSUFFICIENT SIGNAL · STAY STILL · IMPROVE LIGHT', 'bad');
    return false;
  }

  currentHR        = hr;
  lastValidHRTime  = Date.now();
  hrValueEl.textContent = Math.round(hr);
  const zone = hrZone(hr);

  // Tier 2: low confidence — show with warning, freeze pulse
  if (q < Q_GOOD) {
    hrStatusEl.textContent = 'LOW CONFIDENCE · ' + zone.label;
    hrStatusEl.className   = 'hr-status warn';
    hrRing.classList.remove('beating', 'no-signal');
    hrRing.classList.add('warn');
    heartIcon.classList.remove('beating');
    hrValueEl.classList.remove('dim');
    hrValueEl.classList.add('warn');
    return true;
  }

  // Tier 1: full confidence
  hrStatusEl.textContent = zone.label;
  hrStatusEl.className   = 'hr-status ' + zone.cls;
  hrRing.classList.remove('warn', 'no-signal');
  hrRing.classList.add('beating');
  heartIcon.classList.add('beating');
  hrValueEl.classList.remove('dim', 'warn');
  const dur = (60 / hr).toFixed(2) + 's';
  heartIcon.style.animationDuration = dur;
  hrRing.style.animationDuration    = dur;
  return true;
}

function clearHR(reason='ACQUIRING SIGNAL', cls='') {
  currentHR = null;
  hrValueEl.textContent = '--';
  hrValueEl.classList.add('dim');
  hrValueEl.classList.remove('warn');
  hrStatusEl.textContent = reason;
  hrStatusEl.className   = 'hr-status' + (cls ? ' ' + cls : '');
  hrRing.classList.remove('beating', 'warn');
  hrRing.classList.add('no-signal');
  heartIcon.classList.remove('beating');
}

// Watchdog
setInterval(() => {
  const now = Date.now();
  if (currentHR && now - lastValidHRTime > 5000) {
    clearHR('SIGNAL LOST', 'bad');
    updateQualityBadge(0);
  }
  if (lastVitalsTime && now - lastVitalsTime > 8000) {
    updateQualityBadge(0);
  }
}, 1000);

// ═══════════════════════════════════════════
//  PERFUSION STATE
// ═══════════════════════════════════════════
let perfusion = { forehead: 0.30, leftCheek: 0.50, rightCheek: 0.50 };
let bvpPulse  = 0;

socket.on('vitals', ({ hr, bvp, quality }) => {
  lastVitalsTime = Date.now();
  setHR(hr, quality);

  if (Array.isArray(bvp) && bvp.length > 10) {
    const recent = bvp.slice(-90);
    let mn = Infinity, mx = -Infinity;
    for (const v of recent) {
      if (v < mn) mn = v; if (v > mx) mx = v;
    }
    const amp = Math.max(0, Math.min(1, mx - mn));
    perfusion.forehead   = 0.28 + amp * 0.45;
    perfusion.leftCheek  = 0.50 + amp * 0.50;
    perfusion.rightCheek = 0.50 + amp * 0.50;
  }
  if (Array.isArray(bvp) && bvp.length > 2) drawOscilloscope(bvp);
});

// ═══════════════════════════════════════════
//  CANVAS DPR HELPER
// ═══════════════════════════════════════════
function sizeCanvas(canvas, ctx) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { W, H };
}

// ═══════════════════════════════════════════
//  BVP OSCILLOSCOPE
// ═══════════════════════════════════════════
const bvpCanvas = document.getElementById('bvp-canvas');
const bvpCtx    = bvpCanvas.getContext('2d');
let bvpBuffer   = new Array(300).fill(0);

function drawOscilloscope(newData) {
  bvpBuffer.push(...newData);
  bvpBuffer = bvpBuffer.slice(-300);
  const { W, H } = sizeCanvas(bvpCanvas, bvpCtx);
  const mn  = Math.min(...bvpBuffer);
  const mx  = Math.max(...bvpBuffer);
  const rng = mx - mn || 1;
  bvpCtx.clearRect(0, 0, W, H);

  const g = bvpCtx.createLinearGradient(0, 0, W, 0);
  g.addColorStop(0,   'rgba(0,245,160,0)');
  g.addColorStop(0.6, 'rgba(0,245,160,0.4)');
  g.addColorStop(1,   'rgba(0,245,160,1)');
  bvpCtx.lineWidth   = 2.5;
  bvpCtx.strokeStyle = g;
  bvpCtx.shadowColor = '#00f5a0';
  bvpCtx.shadowBlur  = 14;
  bvpCtx.lineJoin    = 'round';
  bvpCtx.beginPath();
  bvpBuffer.forEach((v, i) => {
    const x = (i / (bvpBuffer.length - 1)) * W;
    const y = H - ((v - mn) / rng) * H * 0.85 - H * 0.075;
    i === 0 ? bvpCtx.moveTo(x, y) : bvpCtx.lineTo(x, y);
  });
  bvpCtx.stroke();

  const lastY = H - ((bvpBuffer.at(-1) - mn) / rng) * H * 0.85 - H * 0.075;
  bvpCtx.beginPath();
  bvpCtx.arc(W - 3, lastY, 5, 0, Math.PI * 2);
  bvpCtx.fillStyle  = '#00f5a0';
  bvpCtx.shadowBlur = 22;
  bvpCtx.fill();
}

// ═══════════════════════════════════════════
//  ROI POLYGONS
// ═══════════════════════════════════════════
const ROI_POLYGONS = {
  forehead: {
    points: [109, 10, 338, 297, 332, 333, 299, 337, 151, 108, 69, 104, 67],
    label:  'FOREHEAD',
  },
  leftCheek: {
    points: [50, 101, 36, 205, 187, 123, 117, 118, 119, 100],
    label:  'CHEEK·L',
  },
  rightCheek: {
    points: [280, 330, 266, 425, 411, 352, 346, 347, 348, 329],
    label:  'CHEEK·R',
  },
};

function perfColor(t) {
  t = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (t < 0.25) {
    const k = t / 0.25;
    r = 0; g = Math.round(170 * k); b = Math.round(92 + 163 * k);
  } else if (t < 0.5) {
    const k = (t - 0.25) / 0.25;
    r = 0; g = Math.round(170 + 85 * k); b = Math.round(255 - 95 * k);
  } else if (t < 0.75) {
    const k = (t - 0.5) / 0.25;
    r = Math.round(255 * k); g = 255; b = Math.round(160 - 160 * k);
  } else {
    const k = (t - 0.75) / 0.25;
    r = 255; g = Math.round(255 - 196 * k); b = Math.round(40 * k);
  }
  return [r, g, b];
}

// ═══════════════════════════════════════════
//  ANIMATION — pulse only when confident
//  (prevents fake heartbeat from hallucinated HR)
// ═══════════════════════════════════════════
let landmarks = null;
let meshFPSCount = 0, meshFPSTime = performance.now();

function animate() {
  if (currentHR && currentQuality >= Q_GOOD) {
    bvpPulse = (Math.sin(Date.now() / 1000 * currentHR / 60 * Math.PI * 2) + 1) / 2 * 0.12;
  } else {
    bvpPulse = 0;
  }
  if (landmarks) {
    drawVideoOverlay(landmarks);
    drawFaceMesh(landmarks);
  }
  requestAnimationFrame(animate);
}
animate();

// ═══════════════════════════════════════════
//  VIDEO OVERLAY — ROI brackets on the actual face
// ═══════════════════════════════════════════
const videoEl      = document.getElementById('mp-video');
const videoOverlay = document.getElementById('video-overlay');
const videoOvCtx   = videoOverlay.getContext('2d');
const videoStatus  = document.getElementById('video-status');

function drawVideoOverlay(lms) {
  const { W, H } = sizeCanvas(videoOverlay, videoOvCtx);
  videoOvCtx.clearRect(0, 0, W, H);

  if (!videoEl.videoWidth) return;
  const vW = videoEl.videoWidth, vH = videoEl.videoHeight;

  // object-fit: cover transform
  const scale = Math.max(W / vW, H / vH);
  const rW = vW * scale, rH = vH * scale;
  const oX = (W - rW) / 2;
  const oY = (H - rH) / 2;

  // Mirror x because the video itself is CSS-mirrored (selfie view).
  // The overlay canvas is NOT mirrored, so we mirror coords manually here —
  // that keeps text labels readable.
  const toX = nx => oX + (1 - nx) * rW;
  const toY = ny => oY + ny * rH;

  for (const [key, roi] of Object.entries(ROI_POLYGONS)) {
    let minX = 1, maxX = 0, minY = 1, maxY = 0;
    for (const idx of roi.points) {
      const lm = lms[idx];
      if (!lm) continue;
      if (lm.x < minX) minX = lm.x; if (lm.x > maxX) maxX = lm.x;
      if (lm.y < minY) minY = lm.y; if (lm.y > maxY) maxY = lm.y;
    }
    const padX = (maxX - minX) * 0.18;
    const padY = (maxY - minY) * 0.22;
    minX -= padX; maxX += padX; minY -= padY; maxY += padY;

    // Because of mirror: smaller raw x → larger screen x. Swap.
    const x1 = toX(maxX), x2 = toX(minX);
    const y1 = toY(minY), y2 = toY(maxY);
    const w = x2 - x1, h = y2 - y1;
    if (w <= 0 || h <= 0) continue;

    const intensity = Math.min(1, perfusion[key] + bvpPulse);
    const [r, g, b] = perfColor(intensity);
    const stroke = `rgba(${r},${g},${b},0.95)`;

    videoOvCtx.save();
    videoOvCtx.strokeStyle = stroke;
    videoOvCtx.lineWidth   = 2;
    videoOvCtx.shadowColor = `rgb(${r},${g},${b})`;
    videoOvCtx.shadowBlur  = 10;

    // Corner brackets
    const brk = Math.max(8, Math.min(20, w * 0.18, h * 0.18));
    videoOvCtx.beginPath();
    videoOvCtx.moveTo(x1, y1 + brk); videoOvCtx.lineTo(x1, y1); videoOvCtx.lineTo(x1 + brk, y1);
    videoOvCtx.moveTo(x2 - brk, y1); videoOvCtx.lineTo(x2, y1); videoOvCtx.lineTo(x2, y1 + brk);
    videoOvCtx.moveTo(x1, y2 - brk); videoOvCtx.lineTo(x1, y2); videoOvCtx.lineTo(x1 + brk, y2);
    videoOvCtx.moveTo(x2 - brk, y2); videoOvCtx.lineTo(x2, y2); videoOvCtx.lineTo(x2, y2 - brk);
    videoOvCtx.stroke();

    // Faint pulsing fill
    videoOvCtx.fillStyle = `rgba(${r},${g},${b},${0.08 + bvpPulse * 0.7})`;
    videoOvCtx.fillRect(x1, y1, w, h);

    // Labels
    videoOvCtx.shadowBlur = 4;
    videoOvCtx.font = '600 11px "Share Tech Mono", monospace';
    videoOvCtx.textBaseline = 'bottom';
    videoOvCtx.fillStyle = stroke;
    videoOvCtx.fillText(roi.label, x1 + 2, y1 - 4);

    videoOvCtx.font = '700 10px "Share Tech Mono", monospace';
    videoOvCtx.textBaseline = 'top';
    videoOvCtx.fillText((intensity * 100).toFixed(0) + '%', x1 + 2, y2 + 4);

    videoOvCtx.restore();
  }
}

// ═══════════════════════════════════════════
//  FACE MESH (compact)
// ═══════════════════════════════════════════
const meshCanvas = document.getElementById('mesh-canvas');
const meshCtx    = meshCanvas.getContext('2d');
const meshStatus = document.getElementById('mesh-status');
let   meshReady  = false;

function drawFaceMesh(lms) {
  const { W, H } = sizeCanvas(meshCanvas, meshCtx);
  meshCtx.clearRect(0, 0, W, H);

  meshFPSCount++;
  const now = performance.now();
  if (now - meshFPSTime >= 1000) {
    fpsEl.textContent = meshFPSCount + ' FPS';
    meshFPSCount = 0; meshFPSTime = now;
  }

  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  for (const lm of lms) {
    if (lm.x < minX) minX = lm.x; if (lm.x > maxX) maxX = lm.x;
    if (lm.y < minY) minY = lm.y; if (lm.y > maxY) maxY = lm.y;
  }
  const fW = maxX - minX || 1;
  const fH = maxY - minY || 1;
  const PAD = 0.82;
  const faceAR = fW / fH;
  const canvasAR = W / H;
  let dW, dH;
  if (faceAR < canvasAR) { dH = H * PAD; dW = dH * faceAR; }
  else                    { dW = W * PAD; dH = dW / faceAR; }
  const oX = (W - dW) / 2;
  const oY = (H - dH) / 2;

  const sx = new Float32Array(lms.length);
  const sy = new Float32Array(lms.length);
  for (let i = 0; i < lms.length; i++) {
    sx[i] = oX + ((lms[i].x - minX) / fW) * dW;
    sy[i] = oY + ((lms[i].y - minY) / fH) * dH;
  }

  // 1. Faint full tessellation
  if (window.FACEMESH_TESSELATION) {
    meshCtx.save();
    meshCtx.strokeStyle = 'rgba(0, 217, 255, 0.16)';
    meshCtx.lineWidth   = 0.5;
    meshCtx.beginPath();
    for (const [i, j] of FACEMESH_TESSELATION) {
      meshCtx.moveTo(sx[i], sy[i]);
      meshCtx.lineTo(sx[j], sy[j]);
    }
    meshCtx.stroke();
    meshCtx.restore();
  }

  // 2. ROI fills
  for (const [key, roi] of Object.entries(ROI_POLYGONS)) {
    const pts = roi.points;
    const intensity = Math.min(1, perfusion[key] + bvpPulse);
    const [r, g, b] = perfColor(intensity);

    let cx = 0, cy = 0;
    for (const idx of pts) { cx += sx[idx]; cy += sy[idx]; }
    cx /= pts.length; cy /= pts.length;

    meshCtx.beginPath();
    meshCtx.moveTo(sx[pts[0]], sy[pts[0]]);
    for (let i = 1; i < pts.length; i++) meshCtx.lineTo(sx[pts[i]], sy[pts[i]]);
    meshCtx.closePath();

    const radius = Math.max(20, Math.min(dW, dH) * 0.13);
    const grad = meshCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,    `rgba(${r},${g},${b},0.62)`);
    grad.addColorStop(0.55, `rgba(${r},${g},${b},0.30)`);
    grad.addColorStop(1,    `rgba(${r},${g},${b},0.05)`);
    meshCtx.save();
    meshCtx.fillStyle = grad;
    meshCtx.fill();
    meshCtx.strokeStyle = `rgba(${r},${g},${b},0.95)`;
    meshCtx.lineWidth   = 1.2;
    meshCtx.shadowColor = `rgb(${r},${g},${b})`;
    meshCtx.shadowBlur  = 10;
    meshCtx.stroke();
    meshCtx.restore();
  }

  // 3. Feature outlines
  const features = [
    { set: window.FACEMESH_FACE_OVAL,     color: 'rgba(0, 245, 160, 0.85)', width: 1.2, blur: 6 },
    { set: window.FACEMESH_LIPS,          color: 'rgba(255, 77, 196, 0.90)', width: 0.9, blur: 5 },
    { set: window.FACEMESH_LEFT_EYE,      color: 'rgba(0, 217, 255, 1.0)',  width: 1.0, blur: 6 },
    { set: window.FACEMESH_RIGHT_EYE,     color: 'rgba(0, 217, 255, 1.0)',  width: 1.0, blur: 6 },
    { set: window.FACEMESH_LEFT_EYEBROW,  color: 'rgba(0, 245, 160, 0.85)', width: 0.9, blur: 4 },
    { set: window.FACEMESH_RIGHT_EYEBROW, color: 'rgba(0, 245, 160, 0.85)', width: 0.9, blur: 4 },
  ];
  for (const f of features) {
    if (!f.set) continue;
    meshCtx.save();
    meshCtx.strokeStyle = f.color;
    meshCtx.lineWidth   = f.width;
    meshCtx.shadowColor = f.color;
    meshCtx.shadowBlur  = f.blur;
    meshCtx.beginPath();
    for (const [i, j] of f.set) {
      meshCtx.moveTo(sx[i], sy[i]);
      meshCtx.lineTo(sx[j], sy[j]);
    }
    meshCtx.stroke();
    meshCtx.restore();
  }
}

// ═══════════════════════════════════════════
//  MEDIAPIPE INIT
// ═══════════════════════════════════════════
function initFaceMesh() {
  if (typeof FaceMesh === 'undefined') {
    videoStatus.textContent = 'MEDIAPIPE UNAVAILABLE';
    return;
  }

  const faceMesh = new FaceMesh({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`
  });
  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  // Backend frame capture (the visible video element is also our source)
  const captureCanvas = document.createElement('canvas');
  captureCanvas.width  = 640;
  captureCanvas.height = 480;
  const captureCtx = captureCanvas.getContext('2d');
  let lastFrameSent = 0;

  function sendBackendFrame(hasFace) {
    const now = performance.now();
    if (now - lastFrameSent < 33) return;
    lastFrameSent = now;
    const ts = Date.now() / 1000;
    if (!hasFace) { socket.emit('no_face', { ts }); return; }
    if (videoEl.readyState < 2) return;
    captureCtx.drawImage(videoEl, 0, 0, captureCanvas.width, captureCanvas.height);
    captureCanvas.toBlob(blob => {
      if (!blob) return;
      blob.arrayBuffer().then(buf => socket.emit('face_frame', { img: buf, ts }));
    }, 'image/jpeg', 0.92);
  }

  faceMesh.onResults(results => {
    const hasFace = !!(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0);
    if (hasFace) {
      landmarks = results.multiFaceLandmarks[0];
      if (!meshReady) {
        meshReady = true;
        videoStatus.style.display = 'none';
        meshStatus.style.display  = 'none';
      }
    } else {
      landmarks = null;
      videoStatus.style.display = 'block';
      videoStatus.textContent   = 'NO FACE DETECTED';
      meshStatus.style.display  = 'block';
      meshStatus.textContent    = 'NO FACE';
      const a = sizeCanvas(meshCanvas, meshCtx);
      meshCtx.clearRect(0, 0, a.W, a.H);
      const b = sizeCanvas(videoOverlay, videoOvCtx);
      videoOvCtx.clearRect(0, 0, b.W, b.H);
    }
    sendBackendFrame(hasFace);
  });

  const cam = new Camera(videoEl, {
    onFrame: async () => { await faceMesh.send({ image: videoEl }); },
    width: 1280, height: 720,
  });

  cam.start()
    .then(()  => { videoStatus.textContent = 'DETECTING FACE...'; })
    .catch(err => {
      videoStatus.textContent = 'CAMERA ERROR · CHECK PERMISSIONS';
      console.error('MediaPipe camera error:', err);
    });
}

window.addEventListener('load', () => { setTimeout(initFaceMesh, 800); });
</script>
