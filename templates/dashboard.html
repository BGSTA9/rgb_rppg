<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rPPG · Cardiac Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1632432234/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:        #04060d;
      --panel:     #080c18;
      --border:    #0f1e38;
      --green:     #00f5a0;
      --green-dim: #00a86b;
      --cyan:      #00d9ff;
      --amber:     #ffaa00;
      --magenta:   #ff4dc4;
      --blue:      #0af;
      --red:       #ff3b6b;
      --text:      #8da3c0;
      --glow:      0 0 18px #00f5a080, 0 0 40px #00f5a030;
      --glow-red:  0 0 18px #ff3b6b80, 0 0 40px #ff3b6b30;
      --glow-amber:0 0 12px #ffaa0090;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #050810 0%, #08111f 100%);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 4px;
      color: var(--green);
      text-shadow: var(--glow);
    }
    .logo span { color: var(--text); text-shadow: none; }
    .header-meta {
      display: flex; gap: 32px; align-items: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: var(--glow);
      animation: pulse-dot 2s ease-in-out infinite;
      display: inline-block; margin-right: 6px;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #clock { color: var(--blue); }
    #fps-counter { color: var(--amber); }

    /* ── Main grid: full-height face panel + HR/BVP stack ── */
    main {
      display: grid;
      grid-template-columns: 3fr 2fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }

    .panel {
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }
    .panel-label {
      position: absolute;
      top: 12px; left: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--green-dim);
      z-index: 4;
      pointer-events: none;
    }
    .panel-label-right {
      position: absolute;
      top: 12px; right: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--amber);
      opacity: 0.6;
      z-index: 4;
      pointer-events: none;
    }

    /* ── FACE MESH PANEL (left, full height) ── */
    #mesh-panel {
      grid-row: 1 / 3;
      background:
        radial-gradient(ellipse at 50% 45%, #061226 0%, #02030a 80%);
    }
    /* subtle scanline overlay for CRT vibe */
    #mesh-panel::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        rgba(0, 245, 160, 0.025) 0px,
        rgba(0, 245, 160, 0.025) 1px,
        transparent 1px,
        transparent 3px);
      pointer-events: none;
      z-index: 3;
      mix-blend-mode: screen;
    }
    #mesh-canvas {
      width: 100%; height: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }
    #mesh-status {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem; letter-spacing: 4px;
      color: var(--green-dim); text-align: center;
      pointer-events: none; z-index: 5;
      padding: 14px 22px;
      border: 1px solid var(--green-dim);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(2px);
    }

    /* Color-bar legend */
    #colorbar {
      position: absolute;
      bottom: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem; color: var(--text);
      z-index: 4;
      letter-spacing: 2px;
    }
    #colorbar-gradient {
      width: 130px; height: 6px; border-radius: 3px;
      background: linear-gradient(90deg,
        #001e5c 0%, #00aaff 25%, #00f5a0 50%, #ffd000 75%, #ff3b6b 100%);
      box-shadow: 0 0 8px rgba(0,245,160,0.3);
    }

    /* ── HR PANEL ── */
    #hr-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
    }
    .hr-ring-wrap { position: relative; width: 220px; height: 220px; }
    .hr-ring {
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 2px solid var(--border);
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .hr-ring::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid var(--green);
      box-shadow: var(--glow);
      animation: ring-pulse 1s ease-in-out infinite;
      animation-play-state: paused;
    }
    .hr-ring.beating::before { animation-play-state: running; }
    @keyframes ring-pulse {
      0%   { transform: scale(1);    opacity: 0.8; }
      50%  { transform: scale(1.06); opacity: 0.3; }
      100% { transform: scale(1);    opacity: 0.8; }
    }
    .hr-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      color: var(--green);
      text-shadow: var(--glow);
      line-height: 1; letter-spacing: 2px;
      transition: color 0.4s, text-shadow 0.4s;
    }
    .hr-ring.no-signal .hr-number { color: var(--text); text-shadow: none; opacity: 0.5; }
    .hr-unit {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; color: var(--green-dim);
      letter-spacing: 3px; text-align: center;
    }
    .hr-status {
      font-size: 0.9rem; font-weight: 700;
      letter-spacing: 2px; color: var(--text);
    }
    .hr-status.normal { color: var(--green); }
    .hr-status.low    { color: var(--blue); }
    .hr-status.high   { color: var(--red); text-shadow: var(--glow-red); }
    .hr-status.lost   { color: var(--amber); }

    .heart-icon {
      position: absolute; bottom: 12px; right: 12px;
      font-size: 1.3rem;
      animation: heartbeat 1s ease-in-out infinite;
      animation-play-state: paused;
      filter: drop-shadow(0 0 6px var(--red));
    }
    .heart-icon.beating { animation-play-state: running; }
    @keyframes heartbeat {
      0%{transform:scale(1)} 14%{transform:scale(1.25)}
      28%{transform:scale(1)} 42%{transform:scale(1.12)}
      70%{transform:scale(1)} 100%{transform:scale(1)}
    }

    /* signal quality bars */
    .sig-quality {
      display: flex; gap: 3px; align-items: flex-end;
      height: 14px;
      margin-top: 4px;
    }
    .sig-bar {
      width: 4px; background: var(--border);
      border-radius: 1px;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .sig-bar.lit { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .sig-bar:nth-child(1) { height: 4px; }
    .sig-bar:nth-child(2) { height: 7px; }
    .sig-bar:nth-child(3) { height: 10px; }
    .sig-bar:nth-child(4) { height: 13px; }

    /* ── BVP PANEL ── */
    #bvp-panel { padding-top: 36px; }
    #bvp-canvas { width: 100%; height: calc(100% - 36px); display: block; }
    .grid-overlay {
      position: absolute; inset: 36px 0 0 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 30px;
      pointer-events: none; opacity: 0.5;
    }

    /* ── Corner brackets ── */
    .corner {
      position: absolute; width: 14px; height: 14px;
      border-color: var(--green); border-style: solid; opacity: 0.4;
      z-index: 4;
    }
    .corner.tl { top: 8px;    left: 8px;  border-width: 1px 0 0 1px; }
    .corner.tr { top: 8px;    right: 8px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 8px; left: 8px;  border-width: 0 0 1px 1px; }
    .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>

<!-- Hidden: webcam input for MediaPipe (never displayed) -->
<video id="mp-video" playsinline style="display:none"></video>

<header>
  <div class="logo">rPPG <span>· CARDIAC MONITOR</span></div>
  <div class="header-meta">
    <span><span class="status-dot"></span><span id="status-text">CONNECTING</span></span>
    <span id="clock">00:00:00</span>
    <span id="fps-counter">-- FPS</span>
  </div>
</header>

<main>

  <!-- ① FACE MESH HUD -->
  <div class="panel" id="mesh-panel">
    <div class="panel-label">FACIAL PERFUSION MAP · rPPG SIGNAL</div>
    <div class="panel-label-right">468 LANDMARKS · 3 ROI</div>
    <canvas id="mesh-canvas"></canvas>
    <div id="mesh-status">INITIALIZING FACE MESH...</div>
    <div id="colorbar">
      <span>0%</span>
      <div id="colorbar-gradient"></div>
      <span>100%</span>
    </div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <!-- ② HEART RATE -->
  <div class="panel" id="hr-panel">
    <div class="panel-label">HEART RATE</div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="hr-ring-wrap">
      <div class="hr-ring no-signal" id="hr-ring">
        <div>
          <div class="hr-number" id="hr-value">--</div>
          <div class="hr-unit">BPM</div>
        </div>
      </div>
      <div class="heart-icon" id="heart-icon">♥</div>
    </div>
    <div class="hr-status" id="hr-status">ACQUIRING SIGNAL</div>
    <div class="sig-quality" id="sig-quality">
      <div class="sig-bar"></div>
      <div class="sig-bar"></div>
      <div class="sig-bar"></div>
      <div class="sig-bar"></div>
    </div>
  </div>

  <!-- ③ BVP OSCILLOSCOPE -->
  <div class="panel" id="bvp-panel">
    <div class="panel-label">BVP · BLOOD VOLUME PULSE</div>
    <div class="grid-overlay"></div>
    <canvas id="bvp-canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toTimeString().slice(0, 8);
}
setInterval(updateClock, 1000); updateClock();

// ═══════════════════════════════════════════
//  SOCKET (HR / BVP from Python)
// ═══════════════════════════════════════════
const socket   = io();
const statusEl = document.getElementById('status-text');
socket.on('connect',    () => { statusEl.textContent = 'LIVE'; });
socket.on('disconnect', () => { statusEl.textContent = 'OFFLINE'; });
socket.on('frame', () => {});  // ignore — mesh comes from MediaPipe

// ═══════════════════════════════════════════
//  HR DISPLAY (robust state)
// ═══════════════════════════════════════════
const hrValueEl  = document.getElementById('hr-value');
const hrStatusEl = document.getElementById('hr-status');
const hrRing     = document.getElementById('hr-ring');
const heartIcon  = document.getElementById('heart-icon');
const fpsEl      = document.getElementById('fps-counter');
const sigBars    = document.querySelectorAll('#sig-quality .sig-bar');

function hrZone(hr) {
  if (hr < 50)  return { label: 'BRADYCARDIA',  cls: 'low'    };
  if (hr < 60)  return { label: 'LOW NORMAL',   cls: 'low'    };
  if (hr < 100) return { label: 'NORMAL SINUS', cls: 'normal' };
  if (hr < 120) return { label: 'ELEVATED',     cls: 'high'   };
  return               { label: 'TACHYCARDIA',  cls: 'high'   };
}

let currentHR        = null;
let lastValidHRTime  = 0;
let lastVitalsTime   = 0;
let signalQuality    = 0;   // 0..1

function setHR(hr) {
  // Plausibility gate: human HR is 30..220 bpm
  if (typeof hr !== 'number' || !isFinite(hr) || hr < 30 || hr > 220) return false;
  currentHR        = hr;
  lastValidHRTime  = Date.now();
  hrValueEl.textContent  = Math.round(hr);
  const zone = hrZone(hr);
  hrStatusEl.textContent = zone.label;
  hrStatusEl.className   = 'hr-status ' + zone.cls;
  hrRing.classList.add('beating');
  hrRing.classList.remove('no-signal');
  heartIcon.classList.add('beating');
  const dur = (60 / hr).toFixed(2) + 's';
  heartIcon.style.animationDuration = dur;
  hrRing.style.animationDuration    = dur;
  return true;
}

function clearHR(reason='ACQUIRING SIGNAL', cls='') {
  currentHR = null;
  hrValueEl.textContent  = '--';
  hrStatusEl.textContent = reason;
  hrStatusEl.className   = 'hr-status' + (cls ? ' ' + cls : '');
  hrRing.classList.remove('beating');
  hrRing.classList.add('no-signal');
  heartIcon.classList.remove('beating');
}

function setSignalQuality(q) {
  signalQuality = Math.max(0, Math.min(1, q));
  const lit = Math.round(signalQuality * 4);
  sigBars.forEach((b, i) => b.classList.toggle('lit', i < lit));
}

// Watchdog — drop HR if no fresh data
setInterval(() => {
  const now = Date.now();
  if (currentHR && now - lastValidHRTime > 5000) {
    clearHR('SIGNAL LOST', 'lost');
    setSignalQuality(0);
  }
  if (lastVitalsTime && now - lastVitalsTime > 8000) {
    setSignalQuality(0);
  }
}, 1000);

// ═══════════════════════════════════════════
//  PERFUSION STATE (drives ROI fill colors)
//  rPPG ROIs: cheeks > forehead > nose
// ═══════════════════════════════════════════
let perfusion = {
  forehead:    0.30,
  leftCheek:   0.50,
  rightCheek:  0.50,
};
let bvpPulse = 0;  // breathing-light pulse (0..0.15)

socket.on('vitals', ({ hr, bvp, quality }) => {
  lastVitalsTime = Date.now();
  setHR(hr);

  // Signal quality comes from the backend stabilizer (HR estimate stddev)
  if (typeof quality === 'number') setSignalQuality(quality);

  if (Array.isArray(bvp) && bvp.length > 10) {
    const recent = bvp.slice(-90);
    let mn = Infinity, mx = -Infinity;
    for (const v of recent) {
      if (v < mn) mn = v; if (v > mx) mx = v;
    }
    const amp = Math.max(0, Math.min(1, mx - mn));
    perfusion.forehead   = 0.28 + amp * 0.45;
    perfusion.leftCheek  = 0.50 + amp * 0.50;
    perfusion.rightCheek = 0.50 + amp * 0.50;
  }

  if (Array.isArray(bvp) && bvp.length > 2) drawOscilloscope(bvp);
});

// ═══════════════════════════════════════════
//  BVP OSCILLOSCOPE
// ═══════════════════════════════════════════
const bvpCanvas = document.getElementById('bvp-canvas');
const bvpCtx    = bvpCanvas.getContext('2d');
let bvpBuffer   = new Array(300).fill(0);

function sizeCanvas(canvas, ctx) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { W, H };
}

function drawOscilloscope(newData) {
  bvpBuffer.push(...newData);
  bvpBuffer = bvpBuffer.slice(-300);
  const { W, H } = sizeCanvas(bvpCanvas, bvpCtx);
  const mn  = Math.min(...bvpBuffer);
  const mx  = Math.max(...bvpBuffer);
  const rng = mx - mn || 1;
  bvpCtx.clearRect(0, 0, W, H);

  const g = bvpCtx.createLinearGradient(0, 0, W, 0);
  g.addColorStop(0,   'rgba(0,245,160,0)');
  g.addColorStop(0.6, 'rgba(0,245,160,0.4)');
  g.addColorStop(1,   'rgba(0,245,160,1)');
  bvpCtx.lineWidth   = 2.5;
  bvpCtx.strokeStyle = g;
  bvpCtx.shadowColor = '#00f5a0';
  bvpCtx.shadowBlur  = 14;
  bvpCtx.lineJoin    = 'round';
  bvpCtx.beginPath();
  bvpBuffer.forEach((v, i) => {
    const x = (i / (bvpBuffer.length - 1)) * W;
    const y = H - ((v - mn) / rng) * H * 0.85 - H * 0.075;
    i === 0 ? bvpCtx.moveTo(x, y) : bvpCtx.lineTo(x, y);
  });
  bvpCtx.stroke();

  const lastY = H - ((bvpBuffer.at(-1) - mn) / rng) * H * 0.85 - H * 0.075;
  bvpCtx.beginPath();
  bvpCtx.arc(W - 3, lastY, 5, 0, Math.PI * 2);
  bvpCtx.fillStyle  = '#00f5a0';
  bvpCtx.shadowBlur = 22;
  bvpCtx.fill();
}

// ═══════════════════════════════════════════
//  FACE MESH — HUD STYLE
// ═══════════════════════════════════════════
//
// Visualization layers (back → front):
//   1. Faint full FACEMESH_TESSELATION — circuit-board feel
//   2. ROI polygon fills (forehead / L-cheek / R-cheek), color = perfusion
//   3. Bright contour outlines (oval, eyes, brows, lips)
//   4. Animated horizontal scan line + glow trail
//   5. HUD: bbox brackets, center reticle, ROI leader-line labels
//
// ═══════════════════════════════════════════

const meshCanvas = document.getElementById('mesh-canvas');
const meshCtx    = meshCanvas.getContext('2d');
const meshStatus = document.getElementById('mesh-status');
let   landmarks  = null;
let   meshReady  = false;
let   meshFPSCount = 0, meshFPSTime = performance.now();

// ROI polygons — landmark indices for forehead and cheeks (rPPG zones)
// Ordered to form closed polygons.
const ROI_POLYGONS = {
  forehead: {
    points: [109, 10, 338, 297, 332, 333, 299, 337, 151, 108, 69, 104, 67],
    label:  'FOREHEAD',
    side:   'top',
  },
  leftCheek: {  // viewer's left
    points: [50, 101, 36, 205, 187, 123, 117, 118, 119, 100],
    label:  'CHEEK · L',
    side:   'left',
  },
  rightCheek: { // viewer's right
    points: [280, 330, 266, 425, 411, 352, 346, 347, 348, 329],
    label:  'CHEEK · R',
    side:   'right',
  },
};

// Heat-map colormap: navy → cyan → green → yellow → red
function perfColor(t) {
  t = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (t < 0.25) {
    const k = t / 0.25;
    r = 0;                       g = Math.round(170 * k);     b = Math.round(92 + 163 * k);
  } else if (t < 0.5) {
    const k = (t - 0.25) / 0.25;
    r = 0;                       g = Math.round(170 + 85 * k); b = Math.round(255 - 95 * k);
  } else if (t < 0.75) {
    const k = (t - 0.5) / 0.25;
    r = Math.round(255 * k);     g = 255;                     b = Math.round(160 - 160 * k);
  } else {
    const k = (t - 0.75) / 0.25;
    r = 255;                     g = Math.round(255 - 196 * k); b = Math.round(40 * k);
  }
  return [r, g, b];
}

// Animation loop: pulse brightness from heart rate, then draw
function animateMesh() {
  if (currentHR) {
    bvpPulse = (Math.sin(Date.now() / 1000 * currentHR / 60 * Math.PI * 2) + 1) / 2 * 0.12;
  } else {
    bvpPulse = (Math.sin(Date.now() / 800) + 1) / 2 * 0.04;  // idle shimmer
  }
  if (landmarks) drawFaceMesh(landmarks);
  requestAnimationFrame(animateMesh);
}
animateMesh();

function drawFaceMesh(lms) {
  const { W, H } = sizeCanvas(meshCanvas, meshCtx);
  meshCtx.clearRect(0, 0, W, H);

  // FPS
  meshFPSCount++;
  const now = performance.now();
  if (now - meshFPSTime >= 1000) {
    fpsEl.textContent = meshFPSCount + ' FPS';
    meshFPSCount = 0; meshFPSTime = now;
  }

  // Face bounding box (in normalized coords)
  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  for (const lm of lms) {
    if (lm.x < minX) minX = lm.x; if (lm.x > maxX) maxX = lm.x;
    if (lm.y < minY) minY = lm.y; if (lm.y > maxY) maxY = lm.y;
  }
  const fW = maxX - minX || 1;
  const fH = maxY - minY || 1;

  // Fit face into canvas with padding, preserving aspect
  const PAD = 0.78;
  const faceAR = fW / fH;
  const canvasAR = W / H;
  let dW, dH;
  if (faceAR < canvasAR) { dH = H * PAD; dW = dH * faceAR; }
  else                    { dW = W * PAD; dH = dW / faceAR; }
  const oX = (W - dW) / 2;
  const oY = (H - dH) / 2;

  // Pre-compute screen coords for all landmarks
  const sx = new Float32Array(lms.length);
  const sy = new Float32Array(lms.length);
  for (let i = 0; i < lms.length; i++) {
    sx[i] = oX + ((lms[i].x - minX) / fW) * dW;
    sy[i] = oY + ((lms[i].y - minY) / fH) * dH;
  }

  // ─── 1. Faint full tessellation ───
  if (window.FACEMESH_TESSELATION) {
    meshCtx.save();
    meshCtx.strokeStyle = 'rgba(0, 217, 255, 0.16)';
    meshCtx.lineWidth   = 0.5;
    meshCtx.beginPath();
    for (const [i, j] of FACEMESH_TESSELATION) {
      meshCtx.moveTo(sx[i], sy[i]);
      meshCtx.lineTo(sx[j], sy[j]);
    }
    meshCtx.stroke();
    meshCtx.restore();
  }

  // ─── 2. ROI polygon fills (the rPPG zones) ───
  const roiCenters = {};
  for (const [key, roi] of Object.entries(ROI_POLYGONS)) {
    const pts = roi.points;
    const intensity = Math.min(1, perfusion[key] + bvpPulse);
    const [r, g, b] = perfColor(intensity);

    // centroid for radial gradient + label anchor
    let cx = 0, cy = 0;
    for (const idx of pts) { cx += sx[idx]; cy += sy[idx]; }
    cx /= pts.length; cy /= pts.length;
    roiCenters[key] = { cx, cy };

    // path
    meshCtx.beginPath();
    meshCtx.moveTo(sx[pts[0]], sy[pts[0]]);
    for (let i = 1; i < pts.length; i++) meshCtx.lineTo(sx[pts[i]], sy[pts[i]]);
    meshCtx.closePath();

    // fill with radial gradient
    const radius = Math.max(30, Math.min(dW, dH) * 0.13);
    const grad = meshCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,    `rgba(${r},${g},${b},0.62)`);
    grad.addColorStop(0.55, `rgba(${r},${g},${b},0.30)`);
    grad.addColorStop(1,    `rgba(${r},${g},${b},0.05)`);
    meshCtx.save();
    meshCtx.fillStyle = grad;
    meshCtx.fill();

    // glowing outline
    meshCtx.strokeStyle = `rgba(${r},${g},${b},0.95)`;
    meshCtx.lineWidth   = 1.4;
    meshCtx.shadowColor = `rgb(${r},${g},${b})`;
    meshCtx.shadowBlur  = 14;
    meshCtx.stroke();
    meshCtx.restore();
  }

  // ─── 3. Feature outlines ───
  const features = [
    { set: window.FACEMESH_FACE_OVAL,     color: 'rgba(0, 245, 160, 0.85)', width: 1.4, blur: 8 },
    { set: window.FACEMESH_LIPS,          color: 'rgba(255, 77, 196, 0.90)', width: 1.0, blur: 6 },
    { set: window.FACEMESH_LEFT_EYE,      color: 'rgba(0, 217, 255, 1.0)',  width: 1.2, blur: 7 },
    { set: window.FACEMESH_RIGHT_EYE,     color: 'rgba(0, 217, 255, 1.0)',  width: 1.2, blur: 7 },
    { set: window.FACEMESH_LEFT_EYEBROW,  color: 'rgba(0, 245, 160, 0.85)', width: 1.0, blur: 5 },
    { set: window.FACEMESH_RIGHT_EYEBROW, color: 'rgba(0, 245, 160, 0.85)', width: 1.0, blur: 5 },
  ];
  for (const f of features) {
    if (!f.set) continue;
    meshCtx.save();
    meshCtx.strokeStyle = f.color;
    meshCtx.lineWidth   = f.width;
    meshCtx.shadowColor = f.color;
    meshCtx.shadowBlur  = f.blur;
    meshCtx.beginPath();
    for (const [i, j] of f.set) {
      meshCtx.moveTo(sx[i], sy[i]);
      meshCtx.lineTo(sx[j], sy[j]);
    }
    meshCtx.stroke();
    meshCtx.restore();
  }

  // ─── 4. Scan line (top→bottom sweep) ───
  const scanPeriod = 3200;
  const t = (Date.now() % scanPeriod) / scanPeriod;
  const scanY = oY + t * dH;
  meshCtx.save();
  // glow trail above
  const trailH = 80;
  const trailGrad = meshCtx.createLinearGradient(0, scanY - trailH, 0, scanY);
  trailGrad.addColorStop(0, 'rgba(0, 245, 160, 0)');
  trailGrad.addColorStop(1, 'rgba(0, 245, 160, 0.18)');
  meshCtx.fillStyle = trailGrad;
  meshCtx.fillRect(oX, Math.max(oY, scanY - trailH), dW, Math.min(trailH, scanY - oY));
  // line itself
  meshCtx.strokeStyle = 'rgba(0, 245, 160, 0.95)';
  meshCtx.lineWidth   = 1;
  meshCtx.shadowColor = '#00f5a0';
  meshCtx.shadowBlur  = 10;
  meshCtx.beginPath();
  meshCtx.moveTo(oX, scanY);
  meshCtx.lineTo(oX + dW, scanY);
  meshCtx.stroke();
  meshCtx.restore();

  // ─── 5. HUD overlay ───
  drawHUD(oX, oY, dW, dH, roiCenters);
}

function drawHUD(oX, oY, dW, dH, roiCenters) {
  const brk = 20;
  meshCtx.save();
  meshCtx.strokeStyle = '#ffaa00';
  meshCtx.lineWidth   = 1.3;
  meshCtx.shadowColor = '#ffaa00';
  meshCtx.shadowBlur  = 5;

  // Bracket corners around face bbox
  const corners = [
    [oX, oY + brk, oX, oY, oX + brk, oY],                                 // TL
    [oX + dW - brk, oY, oX + dW, oY, oX + dW, oY + brk],                  // TR
    [oX, oY + dH - brk, oX, oY + dH, oX + brk, oY + dH],                  // BL
    [oX + dW - brk, oY + dH, oX + dW, oY + dH, oX + dW, oY + dH - brk],   // BR
  ];
  for (const [x1, y1, x2, y2, x3, y3] of corners) {
    meshCtx.beginPath();
    meshCtx.moveTo(x1, y1);
    meshCtx.lineTo(x2, y2);
    meshCtx.lineTo(x3, y3);
    meshCtx.stroke();
  }

  // Center reticle
  const cx = oX + dW / 2, cy = oY + dH / 2;
  meshCtx.globalAlpha = 0.55;
  meshCtx.beginPath();
  meshCtx.arc(cx, cy, 5, 0, Math.PI * 2);
  meshCtx.moveTo(cx - 14, cy); meshCtx.lineTo(cx - 7, cy);
  meshCtx.moveTo(cx + 7, cy);  meshCtx.lineTo(cx + 14, cy);
  meshCtx.moveTo(cx, cy - 14); meshCtx.lineTo(cx, cy - 7);
  meshCtx.moveTo(cx, cy + 7);  meshCtx.lineTo(cx, cy + 14);
  meshCtx.stroke();
  meshCtx.globalAlpha = 1;
  meshCtx.restore();

  // ROI leader-line labels
  for (const [key, roi] of Object.entries(ROI_POLYGONS)) {
    const c = roiCenters[key];
    if (!c) continue;
    const intensity = Math.min(1, perfusion[key] + bvpPulse);
    const value     = (intensity * 100).toFixed(0) + '%';
    drawROILabel(c.cx, c.cy, oX, oY, dW, dH, roi.label, value, roi.side, intensity);
  }
}

function drawROILabel(cx, cy, oX, oY, dW, dH, label, value, side, intensity) {
  const [r, g, b] = perfColor(intensity);
  const labelColor = `rgb(${r},${g},${b})`;

  // Where the label box anchors (just past the bbox edge)
  let ax, ay, tx, ty, align;
  const off = 18;
  if (side === 'right') {
    ax = oX + dW + off;  ay = cy;
    tx = ax + 8;          ty = ay;
    align = 'left';
  } else if (side === 'left') {
    ax = oX - off;        ay = cy;
    tx = ax - 8;          ty = ay;
    align = 'right';
  } else { // top
    ax = cx;              ay = oY - off;
    tx = ax;              ty = ay - 4;
    align = 'center';
  }

  meshCtx.save();
  // leader line (dashed)
  meshCtx.setLineDash([3, 3]);
  meshCtx.strokeStyle = 'rgba(255, 170, 0, 0.7)';
  meshCtx.lineWidth   = 1;
  meshCtx.beginPath();
  meshCtx.moveTo(cx, cy);
  meshCtx.lineTo(ax, ay);
  meshCtx.stroke();
  meshCtx.setLineDash([]);

  // anchor dot
  meshCtx.fillStyle = '#ffaa00';
  meshCtx.shadowColor = '#ffaa00';
  meshCtx.shadowBlur  = 4;
  meshCtx.beginPath();
  meshCtx.arc(ax, ay, 2.5, 0, Math.PI * 2);
  meshCtx.fill();
  meshCtx.shadowBlur = 0;

  // text
  meshCtx.textAlign    = align;
  meshCtx.textBaseline = 'middle';
  meshCtx.font = '600 10px "Share Tech Mono", monospace';
  meshCtx.fillStyle = '#ffaa00';
  meshCtx.fillText(label, tx, ty - 7);
  meshCtx.font = '700 13px "Share Tech Mono", monospace';
  meshCtx.fillStyle = labelColor;
  meshCtx.shadowColor = labelColor;
  meshCtx.shadowBlur  = 6;
  meshCtx.fillText(value, tx, ty + 7);
  meshCtx.restore();
}

// ═══════════════════════════════════════════
//  MEDIAPIPE FACE MESH INIT
// ═══════════════════════════════════════════
function initFaceMesh() {
  if (typeof FaceMesh === 'undefined') {
    meshStatus.textContent = 'MEDIAPIPE UNAVAILABLE';
    return;
  }

  const faceMesh = new FaceMesh({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  const mpVideo = document.getElementById('mp-video');

  // Downscaled JPEG capture → Python rPPG model
  const captureCanvas = document.createElement('canvas');
  captureCanvas.width  = 640;
  captureCanvas.height = 480;
  const captureCtx = captureCanvas.getContext('2d');
  let lastFrameSent = 0;

  function sendBackendFrame(hasFace) {
    const now = performance.now();
    if (now - lastFrameSent < 33) return;   // ~30 fps cap
    lastFrameSent = now;
    const ts = Date.now() / 1000;
    if (!hasFace) { socket.emit('no_face', { ts }); return; }
    if (mpVideo.readyState < 2) return;
    captureCtx.drawImage(mpVideo, 0, 0, captureCanvas.width, captureCanvas.height);
    captureCanvas.toBlob(blob => {
      if (!blob) return;
      blob.arrayBuffer().then(buf => socket.emit('face_frame', { img: buf, ts }));
    }, 'image/jpeg', 0.92);
  }

  faceMesh.onResults(results => {
    const hasFace = !!(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0);
    if (hasFace) {
      landmarks = results.multiFaceLandmarks[0];
      if (!meshReady) {
        meshReady = true;
        meshStatus.style.display = 'none';
      }
    } else {
      landmarks = null;
      meshStatus.style.display = 'block';
      meshStatus.textContent   = 'NO FACE DETECTED';
      const { W, H } = sizeCanvas(meshCanvas, meshCtx);
      meshCtx.clearRect(0, 0, W, H);
    }
    sendBackendFrame(hasFace);
  });

  const cam = new Camera(mpVideo, {
    onFrame: async () => { await faceMesh.send({ image: mpVideo }); },
    width: 1280, height: 720,
  });

  cam.start()
    .then(()  => { meshStatus.textContent = 'DETECTING FACE...'; })
    .catch(err => {
      meshStatus.textContent = 'CAMERA ERROR';
      console.error('MediaPipe camera error:', err);
    });
}

window.addEventListener('load', () => { setTimeout(initFaceMesh, 800); });
</script>
