<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rPPG · Cardiac Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1632432234/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:       #04060d;
      --panel:    #080c18;
      --border:   #0f1e38;
      --green:    #00f5a0;
      --green-dim:#00a86b;
      --cyan:     #00d9ff;
      --cyan-dim: #007a99;
      --blue:     #0af;
      --red:      #ff3b6b;
      --magenta:  #ff5dc8;
      --text:     #8da3c0;
      --text-hi:  #cde0f5;
      --glow:     0 0 18px #00f5a080, 0 0 40px #00f5a030;
      --glow-cyan:0 0 18px #00d9ff80, 0 0 40px #00d9ff30;
      --glow-red: 0 0 18px #ff3b6b80, 0 0 40px #ff3b6b30;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #050810 0%, #08111f 100%);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 4px;
      color: var(--green);
      text-shadow: var(--glow);
    }
    .logo span { color: var(--text); text-shadow: none; }
    .header-meta {
      display: flex; gap: 32px; align-items: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: var(--glow);
      animation: pulse-dot 2s ease-in-out infinite;
      display: inline-block; margin-right: 6px;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #clock { color: var(--blue); }

    main {
      display: grid;
      grid-template-columns: 3fr 2fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }

    .panel {
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }
    .panel-label {
      position: absolute;
      top: 12px; left: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--green-dim);
      z-index: 4;
      pointer-events: none;
    }

    /* ── MAIN MESH PANEL ── */
    #mesh-panel {
      grid-row: 1 / 3;
      background:
        radial-gradient(ellipse at center, #050a18 0%, #02040a 70%, #010205 100%);
    }
    /* tech grid backdrop */
    #mesh-panel::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,217,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,217,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 1;
    }
    /* vignette */
    #mesh-panel::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 45%, rgba(2,4,8,0.85) 100%);
      pointer-events: none;
      z-index: 2;
    }
    #mesh-canvas {
      width: 100%; height: 100%;
      display: block;
      position: relative;
      z-index: 3;
    }
    #mesh-status {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem; letter-spacing: 4px;
      color: var(--cyan); text-align: center;
      pointer-events: none; z-index: 4;
      text-shadow: var(--glow-cyan);
    }
    #mesh-telemetry {
      position: absolute;
      bottom: 14px; left: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--cyan); opacity: 0.85;
      letter-spacing: 2px; line-height: 1.6;
      z-index: 4; pointer-events: none;
      text-shadow: 0 0 6px rgba(0,217,255,0.5);
    }
    #mesh-telemetry .lbl { color: var(--text); }

    /* ── HR PANEL ── */
    #hr-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
    }
    .hr-ring-wrap { position: relative; width: 220px; height: 220px; }
    .hr-ring {
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 2px solid var(--border);
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .hr-ring::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid var(--green);
      box-shadow: var(--glow);
      animation: ring-pulse 1s ease-in-out infinite;
      animation-play-state: paused;
    }
    .hr-ring.beating::before { animation-play-state: running; }
    @keyframes ring-pulse {
      0%   { transform: scale(1);    opacity: 0.8; }
      50%  { transform: scale(1.06); opacity: 0.3; }
      100% { transform: scale(1);    opacity: 0.8; }
    }
    .hr-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      color: var(--green);
      text-shadow: var(--glow);
      line-height: 1; letter-spacing: 2px;
    }
    .hr-unit {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; color: var(--green-dim);
      letter-spacing: 3px; text-align: center;
    }
    .hr-status {
      font-size: 0.9rem; font-weight: 700;
      letter-spacing: 2px; color: var(--text);
    }
    .hr-status.normal { color: var(--green); }
    .hr-status.low    { color: var(--blue); }
    .hr-status.high   { color: var(--red); text-shadow: var(--glow-red); }

    .heart-icon {
      position: absolute; bottom: 12px; right: 12px;
      font-size: 1.3rem;
      animation: heartbeat 1s ease-in-out infinite;
      animation-play-state: paused;
      filter: drop-shadow(0 0 6px var(--red));
    }
    .heart-icon.beating { animation-play-state: running; }
    @keyframes heartbeat {
      0%{transform:scale(1)} 14%{transform:scale(1.25)}
      28%{transform:scale(1)} 42%{transform:scale(1.12)}
      70%{transform:scale(1)} 100%{transform:scale(1)}
    }

    /* ── BVP PANEL ── */
    #bvp-panel { padding-top: 36px; }
    #bvp-canvas { width: 100%; height: calc(100% - 36px); display: block; }
    .grid-overlay {
      position: absolute; inset: 36px 0 0 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 30px;
      pointer-events: none; opacity: 0.5;
    }

    /* ── Corner brackets ── */
    .corner {
      position: absolute; width: 14px; height: 14px;
      border-color: var(--green); border-style: solid; opacity: 0.4;
    }
    .corner.tl { top: 8px;    left: 8px;  border-width: 1px 0 0 1px; }
    .corner.tr { top: 8px;    right: 8px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 8px; left: 8px;  border-width: 0 0 1px 1px; }
    .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>

<!-- Hidden: webcam input for MediaPipe (never displayed) -->
<video id="mp-video" playsinline style="display:none"></video>

<header>
  <div class="logo">rPPG <span>· CARDIAC MONITOR</span></div>
  <div class="header-meta">
    <span><span class="status-dot"></span><span id="status-text">CONNECTING</span></span>
    <span id="clock">00:00:00</span>
    <span id="fps-counter">-- FPS</span>
  </div>
</header>

<main>

  <!-- ① MONOCULAR FACE CAPTURE -->
  <div class="panel" id="mesh-panel">
    <div class="panel-label">MONOCULAR FACE CAPTURE · rPPG PERFUSION</div>
    <canvas id="mesh-canvas"></canvas>
    <div id="mesh-status">INITIALIZING FACE MESH...</div>
    <div id="mesh-telemetry">
      <div><span class="lbl">LANDMARKS</span> <span id="t-lms">000</span></div>
      <div><span class="lbl">DEPTH</span>     <span id="t-depth">0.000</span></div>
      <div><span class="lbl">YAW</span>       <span id="t-yaw">+0.0°</span></div>
      <div><span class="lbl">PITCH</span>     <span id="t-pitch">+0.0°</span></div>
      <div><span class="lbl">TRACK</span>     <span id="t-track">--</span></div>
    </div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <!-- ② HEART RATE -->
  <div class="panel" id="hr-panel">
    <div class="panel-label">HEART RATE</div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="hr-ring-wrap">
      <div class="hr-ring" id="hr-ring">
        <div>
          <div class="hr-number" id="hr-value">--</div>
          <div class="hr-unit">BPM</div>
        </div>
      </div>
      <div class="heart-icon" id="heart-icon">♥</div>
    </div>
    <div class="hr-status" id="hr-status">ACQUIRING SIGNAL</div>
  </div>

  <!-- ③ BVP OSCILLOSCOPE -->
  <div class="panel" id="bvp-panel">
    <div class="panel-label">BVP · BLOOD VOLUME PULSE</div>
    <div class="grid-overlay"></div>
    <canvas id="bvp-canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toTimeString().slice(0, 8);
}
setInterval(updateClock, 1000); updateClock();

// ═══════════════════════════════════════════
//  SOCKET
// ═══════════════════════════════════════════
const socket   = io();
const statusEl = document.getElementById('status-text');
socket.on('connect',    () => { statusEl.textContent = 'LIVE'; });
socket.on('disconnect', () => { statusEl.textContent = 'OFFLINE'; });

// ═══════════════════════════════════════════
//  HR DISPLAY
// ═══════════════════════════════════════════
const hrValueEl  = document.getElementById('hr-value');
const hrStatusEl = document.getElementById('hr-status');
const hrRing     = document.getElementById('hr-ring');
const heartIcon  = document.getElementById('heart-icon');
const fpsEl      = document.getElementById('fps-counter');

function hrZone(hr) {
  if (hr < 50)  return { label: 'BRADYCARDIA',  cls: 'low'    };
  if (hr < 60)  return { label: 'LOW NORMAL',   cls: 'low'    };
  if (hr < 100) return { label: 'NORMAL SINUS', cls: 'normal' };
  if (hr < 120) return { label: 'ELEVATED',     cls: 'high'   };
  return               { label: 'TACHYCARDIA',  cls: 'high'   };
}

let perfusion = {
  forehead:    0.25,
  left_cheek:  0.18,
  right_cheek: 0.18,
  nose:        0.20,
  chin:        0.10,
};
let currentHR = null;
let bvpPulse  = 0;

socket.on('vitals', ({ hr, bvp }) => {
  if (hr) {
    currentHR = hr;
    hrValueEl.textContent  = hr.toFixed(1);
    const zone = hrZone(hr);
    hrStatusEl.textContent = zone.label;
    hrStatusEl.className   = 'hr-status ' + zone.cls;
    hrRing.classList.add('beating');
    heartIcon.classList.add('beating');
    const dur = (60 / hr).toFixed(2) + 's';
    heartIcon.style.animationDuration = dur;
    hrRing.style.animationDuration    = dur;
  }

  if (bvp && bvp.length > 10) {
    const recent = bvp.slice(-60);
    const amp = Math.max(0, Math.min(1,
      Math.max(...recent) - Math.min(...recent)));
    perfusion.forehead    = 0.28 + amp * 0.42;
    perfusion.left_cheek  = 0.52 + amp * 0.48;
    perfusion.right_cheek = 0.52 + amp * 0.48;
    perfusion.nose        = 0.33 + amp * 0.28;
    perfusion.chin        = 0.12 + amp * 0.18;
  }

  if (bvp && bvp.length > 2) drawOscilloscope(bvp);
});

// ═══════════════════════════════════════════
//  BVP OSCILLOSCOPE
// ═══════════════════════════════════════════
const bvpCanvas = document.getElementById('bvp-canvas');
const bvpCtx    = bvpCanvas.getContext('2d');
let bvpBuffer   = new Array(300).fill(0);

function drawOscilloscope(newData) {
  bvpBuffer.push(...newData);
  bvpBuffer = bvpBuffer.slice(-300);
  const W = bvpCanvas.offsetWidth;
  const H = bvpCanvas.offsetHeight;
  bvpCanvas.width = W; bvpCanvas.height = H;
  const mn  = Math.min(...bvpBuffer);
  const mx  = Math.max(...bvpBuffer);
  const rng = mx - mn || 1;
  bvpCtx.clearRect(0, 0, W, H);
  const g = bvpCtx.createLinearGradient(0, 0, W, 0);
  g.addColorStop(0,   'rgba(0,245,160,0)');
  g.addColorStop(0.6, 'rgba(0,245,160,0.4)');
  g.addColorStop(1,   'rgba(0,245,160,1)');
  bvpCtx.lineWidth = 2.5; bvpCtx.strokeStyle = g;
  bvpCtx.shadowColor = '#00f5a0'; bvpCtx.shadowBlur = 14;
  bvpCtx.lineJoin = 'round';
  bvpCtx.beginPath();
  bvpBuffer.forEach((v, i) => {
    const x = (i / (bvpBuffer.length - 1)) * W;
    const y = H - ((v - mn) / rng) * H * 0.85 - H * 0.075;
    i === 0 ? bvpCtx.moveTo(x, y) : bvpCtx.lineTo(x, y);
  });
  bvpCtx.stroke();
  const lastY = H - ((bvpBuffer.at(-1) - mn) / rng) * H * 0.85 - H * 0.075;
  bvpCtx.beginPath();
  bvpCtx.arc(W - 3, lastY, 5, 0, Math.PI * 2);
  bvpCtx.fillStyle  = '#00f5a0';
  bvpCtx.shadowBlur = 22;
  bvpCtx.fill();
}

// ═══════════════════════════════════════════
//  PERFUSION HELPERS
// ═══════════════════════════════════════════
function jet(t) {
  t = Math.max(0, Math.min(1, t));
  const r = Math.min(1, Math.max(0, 1.5 - Math.abs(4*t - 3)));
  const g = Math.min(1, Math.max(0, 1.5 - Math.abs(4*t - 2)));
  const b = Math.min(1, Math.max(0, 1.5 - Math.abs(4*t - 1)));
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

function regionIntensity(nx, ny) {
  if (ny < 0.28)                              return perfusion.forehead;
  if (ny < 0.58 && nx > 0.30 && nx < 0.70)  return perfusion.nose;
  if (ny < 0.74 && nx <= 0.46)               return perfusion.left_cheek;
  if (ny < 0.74 && nx >= 0.54)               return perfusion.right_cheek;
  return perfusion.chin;
}

// ═══════════════════════════════════════════
//  MESH RENDER STATE
// ═══════════════════════════════════════════
const meshCanvas = document.getElementById('mesh-canvas');
const meshCtx    = meshCanvas.getContext('2d');
const meshStatus = document.getElementById('mesh-status');
const tLms   = document.getElementById('t-lms');
const tDepth = document.getElementById('t-depth');
const tYaw   = document.getElementById('t-yaw');
const tPitch = document.getElementById('t-pitch');
const tTrack = document.getElementById('t-track');

let landmarks = null;
let meshReady = false;
let meshFPSCount = 0, meshFPSTime = performance.now();

// Animation loop runs every frame
function animateMesh() {
  if (currentHR) {
    bvpPulse = (Math.sin(Date.now()/1000 * currentHR/60 * Math.PI*2) + 1)/2 * 0.11;
  }
  if (landmarks) drawAvatar(landmarks);
  requestAnimationFrame(animateMesh);
}
animateMesh();

// Cache contour edge sets after MediaPipe is loaded
let contourSets = null;
function ensureContourSets() {
  if (contourSets) return contourSets;
  if (typeof FACEMESH_FACE_OVAL === 'undefined') return null;
  contourSets = {
    oval:    FACEMESH_FACE_OVAL,
    leftEye: FACEMESH_LEFT_EYE,
    rightEye: FACEMESH_RIGHT_EYE,
    leftBrow: FACEMESH_LEFT_EYEBROW,
    rightBrow: FACEMESH_RIGHT_EYEBROW,
    lips:    FACEMESH_LIPS,
    leftIris:  (typeof FACEMESH_LEFT_IRIS  !== 'undefined') ? FACEMESH_LEFT_IRIS  : [],
    rightIris: (typeof FACEMESH_RIGHT_IRIS !== 'undefined') ? FACEMESH_RIGHT_IRIS : [],
    tess:    FACEMESH_TESSELATION || [],
  };
  return contourSets;
}

function drawContour(ctx, edges, lms, toX, toY, color, width, glow, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = color;
  ctx.shadowBlur = glow;
  ctx.beginPath();
  edges.forEach(([i, j]) => {
    const a = lms[i], b = lms[j];
    if (!a || !b) return;
    ctx.moveTo(toX(a), toY(a));
    ctx.lineTo(toX(b), toY(b));
  });
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════
//  AVATAR RENDER  (monocular face capture style)
// ═══════════════════════════════════════════
function drawAvatar(lms) {
  const W = meshCanvas.offsetWidth;
  const H = meshCanvas.offsetHeight;
  if (meshCanvas.width !== W || meshCanvas.height !== H) {
    meshCanvas.width = W; meshCanvas.height = H;
  }

  // FPS
  meshFPSCount++;
  const now = performance.now();
  if (now - meshFPSTime >= 1000) {
    fpsEl.textContent = meshFPSCount + ' FPS';
    meshFPSCount = 0; meshFPSTime = now;
  }

  // Bbox
  let minX = 1, maxX = 0, minY = 1, maxY = 0, minZ = 1, maxZ = -1;
  lms.forEach(lm => {
    if (lm.x < minX) minX = lm.x; if (lm.x > maxX) maxX = lm.x;
    if (lm.y < minY) minY = lm.y; if (lm.y > maxY) maxY = lm.y;
    if (lm.z < minZ) minZ = lm.z; if (lm.z > maxZ) maxZ = lm.z;
  });
  const fW = maxX - minX || 1;
  const fH = maxY - minY || 1;
  const zRange = (maxZ - minZ) || 1;

  const faceAR   = fW / fH;
  const canvasAR = W / H;
  let dW, dH;
  if (faceAR < canvasAR) { dH = H * 0.86; dW = dH * faceAR; }
  else                   { dW = W * 0.86; dH = dW / faceAR; }
  const oX = (W - dW) / 2;
  const oY = (H - dH) / 2;

  const toX = lm => ((lm.x - minX) / fW) * dW + oX;
  const toY = lm => ((lm.y - minY) / fH) * dH + oY;
  const zNorm = lm => 1 - (lm.z - minZ) / zRange;   // 0 (back) → 1 (front)

  meshCtx.clearRect(0, 0, W, H);

  const sets = ensureContourSets();

  // ── Layer 0: subtle perfusion blobs (background heat) ──
  const blobR = Math.min(dW, dH) * 0.05;
  meshCtx.save();
  meshCtx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < lms.length; i += 4) {  // sparse — every 4th landmark
    const lm = lms[i];
    const px = toX(lm), py = toY(lm);
    const nx = (lm.x - minX) / fW;
    const ny = (lm.y - minY) / fH;
    const intensity = Math.min(1, regionIntensity(nx, ny) + bvpPulse);
    const [r, g, b] = jet(intensity);
    const grad = meshCtx.createRadialGradient(px, py, 0, px, py, blobR);
    grad.addColorStop(0,   `rgba(${r},${g},${b},0.30)`);
    grad.addColorStop(0.5, `rgba(${r},${g},${b},0.10)`);
    grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    meshCtx.beginPath();
    meshCtx.arc(px, py, blobR, 0, Math.PI*2);
    meshCtx.fillStyle = grad;
    meshCtx.fill();
  }
  meshCtx.restore();

  // ── Layer 1: depth-shaded tessellation wireframe ──
  if (sets && sets.tess.length) {
    meshCtx.save();
    meshCtx.lineWidth = 0.45;
    meshCtx.lineCap = 'round';
    meshCtx.shadowColor = 'rgba(0,217,255,0.4)';
    meshCtx.shadowBlur = 4;
    sets.tess.forEach(([i, j]) => {
      const a = lms[i], b = lms[j];
      if (!a || !b) return;
      const za = zNorm(a), zb = zNorm(b);
      const z = (za + zb) / 2;
      // closer landmarks → brighter cyan; further → darker blue
      const alpha = 0.10 + z * 0.45;
      const cyanMix = 0.4 + z * 0.6;
      meshCtx.strokeStyle = `rgba(${Math.round(40 + 40*cyanMix)},${Math.round(180 + 40*cyanMix)},${Math.round(220 + 30*cyanMix)},${alpha})`;
      meshCtx.beginPath();
      meshCtx.moveTo(toX(a), toY(a));
      meshCtx.lineTo(toX(b), toY(b));
      meshCtx.stroke();
    });
    meshCtx.restore();
  }

  // ── Layer 2: bright feature contours ──
  if (sets) {
    // Face oval — outer halo + bright line
    drawContour(meshCtx, sets.oval, lms, toX, toY, '#00d9ff', 2.4, 18, 0.85);
    drawContour(meshCtx, sets.oval, lms, toX, toY, '#e0fbff', 0.9, 6,  0.95);

    // Eyebrows
    drawContour(meshCtx, sets.leftBrow,  lms, toX, toY, '#00d9ff', 1.6, 10, 0.85);
    drawContour(meshCtx, sets.rightBrow, lms, toX, toY, '#00d9ff', 1.6, 10, 0.85);

    // Eyes
    drawContour(meshCtx, sets.leftEye,  lms, toX, toY, '#aef6ff', 1.6, 12, 0.95);
    drawContour(meshCtx, sets.rightEye, lms, toX, toY, '#aef6ff', 1.6, 12, 0.95);

    // Lips
    drawContour(meshCtx, sets.lips, lms, toX, toY, '#ff5dc8', 1.6, 12, 0.9);

    // Iris — bright fill + ring
    [sets.leftIris, sets.rightIris].forEach(iris => {
      if (!iris.length) return;
      const idxSet = new Set();
      iris.forEach(([i, j]) => { idxSet.add(i); idxSet.add(j); });
      const pts = [...idxSet].map(i => lms[i]).filter(Boolean);
      if (pts.length < 3) return;
      let cx = 0, cy = 0;
      pts.forEach(p => { cx += toX(p); cy += toY(p); });
      cx /= pts.length; cy /= pts.length;
      let r = 0;
      pts.forEach(p => {
        const dx = toX(p) - cx, dy = toY(p) - cy;
        r += Math.sqrt(dx*dx + dy*dy);
      });
      r /= pts.length;
      meshCtx.save();
      meshCtx.shadowColor = '#00d9ff';
      meshCtx.shadowBlur = 16;
      meshCtx.strokeStyle = '#aef6ff';
      meshCtx.lineWidth = 1.4;
      meshCtx.beginPath();
      meshCtx.arc(cx, cy, r, 0, Math.PI*2);
      meshCtx.stroke();
      // pupil dot
      meshCtx.fillStyle = '#00d9ff';
      meshCtx.beginPath();
      meshCtx.arc(cx, cy, Math.max(1.5, r*0.35), 0, Math.PI*2);
      meshCtx.fill();
      meshCtx.restore();
    });
  }

  // ── Layer 3: vertical scan sweep ──
  const scanY = oY + ((Date.now() % 2200) / 2200) * dH;
  const scanGrad = meshCtx.createLinearGradient(0, scanY - 30, 0, scanY + 30);
  scanGrad.addColorStop(0,   'rgba(0,217,255,0)');
  scanGrad.addColorStop(0.5, 'rgba(0,217,255,0.18)');
  scanGrad.addColorStop(1,   'rgba(0,217,255,0)');
  meshCtx.save();
  meshCtx.fillStyle = scanGrad;
  meshCtx.fillRect(oX, scanY - 30, dW, 60);
  meshCtx.strokeStyle = 'rgba(170,250,255,0.6)';
  meshCtx.lineWidth = 0.8;
  meshCtx.shadowColor = '#00d9ff'; meshCtx.shadowBlur = 8;
  meshCtx.beginPath();
  meshCtx.moveTo(oX, scanY); meshCtx.lineTo(oX + dW, scanY);
  meshCtx.stroke();
  meshCtx.restore();

  // ── Layer 4: tracking reticles around face bbox ──
  drawReticles(meshCtx, oX, oY, dW, dH);

  // ── Telemetry update ──
  tLms.textContent   = String(lms.length).padStart(3, '0');
  tDepth.textContent = (zRange).toFixed(3);
  // crude head pose from key landmarks
  // nose tip = 1, left eye outer = 33, right eye outer = 263, chin = 152, forehead = 10
  const nose = lms[1], leftEye = lms[33], rightEye = lms[263], chin = lms[152], fore = lms[10];
  if (nose && leftEye && rightEye) {
    const eyeMidX = (leftEye.x + rightEye.x) / 2;
    const yaw = (nose.x - eyeMidX) * 180;
    tYaw.textContent = (yaw >= 0 ? '+' : '') + yaw.toFixed(1) + '°';
  }
  if (nose && chin && fore) {
    const faceMidY = (chin.y + fore.y) / 2;
    const pitch = (nose.y - faceMidY) * 180;
    tPitch.textContent = (pitch >= 0 ? '+' : '') + pitch.toFixed(1) + '°';
  }
  tTrack.textContent = currentHR ? 'LOCK · rPPG' : 'LOCK · ACQ';
}

function drawReticles(ctx, x, y, w, h) {
  const len = Math.min(w, h) * 0.08;
  ctx.save();
  ctx.strokeStyle = '#00d9ff';
  ctx.lineWidth = 1.2;
  ctx.shadowColor = '#00d9ff';
  ctx.shadowBlur = 8;
  // four L-corners
  const corners = [
    [x,     y,     1, 1],
    [x+w,   y,    -1, 1],
    [x,     y+h,   1,-1],
    [x+w,   y+h,  -1,-1],
  ];
  corners.forEach(([cx, cy, sx, sy]) => {
    ctx.beginPath();
    ctx.moveTo(cx, cy + sy*len);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + sx*len, cy);
    ctx.stroke();
  });
  // crosshair tick marks at midpoints
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.moveTo(x + w/2 - 6, y);     ctx.lineTo(x + w/2 + 6, y);
  ctx.moveTo(x + w/2 - 6, y + h); ctx.lineTo(x + w/2 + 6, y + h);
  ctx.moveTo(x,     y + h/2 - 6); ctx.lineTo(x,     y + h/2 + 6);
  ctx.moveTo(x + w, y + h/2 - 6); ctx.lineTo(x + w, y + h/2 + 6);
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════
//  FACE FRAME STREAMING TO PYTHON
// ═══════════════════════════════════════════
const cropCanvas = document.createElement('canvas');
cropCanvas.width = 128; cropCanvas.height = 128;
const cropCtx = cropCanvas.getContext('2d');
let lastFrameSent = 0;

function sendFaceFrame(lms, video) {
  const now = performance.now();
  if (now - lastFrameSent < 30) return;   // throttle ~30fps max
  lastFrameSent = now;

  if (!video.videoWidth || !video.videoHeight) return;

  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  lms.forEach(lm => {
    if (lm.x < minX) minX = lm.x; if (lm.x > maxX) maxX = lm.x;
    if (lm.y < minY) minY = lm.y; if (lm.y > maxY) maxY = lm.y;
  });
  const padX = (maxX - minX) * 0.18;
  const padY = (maxY - minY) * 0.22;
  const vW = video.videoWidth, vH = video.videoHeight;
  const sx = Math.max(0, Math.floor((minX - padX) * vW));
  const sy = Math.max(0, Math.floor((minY - padY) * vH));
  const ex = Math.min(vW, Math.ceil((maxX + padX) * vW));
  const ey = Math.min(vH, Math.ceil((maxY + padY) * vH));
  const sw = Math.max(1, ex - sx);
  const sh = Math.max(1, ey - sy);

  cropCtx.drawImage(video, sx, sy, sw, sh, 0, 0, 128, 128);
  cropCanvas.toBlob(blob => {
    if (!blob) return;
    blob.arrayBuffer().then(buf => {
      socket.emit('face_frame', { img: buf, ts: Date.now() / 1000 });
    });
  }, 'image/jpeg', 0.72);
}

let lastNoFaceSent = 0;
function sendNoFace() {
  const now = performance.now();
  if (now - lastNoFaceSent < 100) return;
  lastNoFaceSent = now;
  socket.emit('no_face', { ts: Date.now() / 1000 });
}

// ═══════════════════════════════════════════
//  MEDIAPIPE FACE MESH INIT
// ═══════════════════════════════════════════
function initFaceMesh() {
  if (typeof FaceMesh === 'undefined') {
    meshStatus.textContent = 'MEDIAPIPE UNAVAILABLE';
    return;
  }

  const faceMesh = new FaceMesh({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,        // adds iris landmarks (468 → 478)
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  const mpVideo = document.getElementById('mp-video');

  faceMesh.onResults(results => {
    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
      landmarks = results.multiFaceLandmarks[0];
      if (!meshReady) {
        meshReady = true;
        meshStatus.style.display = 'none';
      }
      sendFaceFrame(landmarks, mpVideo);
    } else {
      landmarks = null;
      meshStatus.style.display = 'block';
      meshStatus.textContent   = 'NO FACE DETECTED';
      const W = meshCanvas.offsetWidth;
      const H = meshCanvas.offsetHeight;
      meshCanvas.width = W; meshCanvas.height = H;
      meshCtx.clearRect(0, 0, W, H);
      sendNoFace();
    }
  });

  const cam = new Camera(mpVideo, {
    onFrame: async () => { await faceMesh.send({ image: mpVideo }); },
    width: 1280, height: 720,
  });

  cam.start()
    .then(()  => { meshStatus.textContent = 'DETECTING FACE...'; })
    .catch(err => {
      meshStatus.textContent = 'CAMERA ERROR';
      console.error('MediaPipe camera error:', err);
    });
}

window.addEventListener('load', () => { setTimeout(initFaceMesh, 800); });
</script>
